server:
  port: ${SERVER_PORT:9090}

spring:
  application:
    name: gateway-service3
  # Evita 403: desactiva seguridad reactiva si viene por dependencia transitiva
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      globalcors:
        corsConfigurations:
          "[/**]":
            # En producción, configura CORS por variable de entorno con los orígenes permitidos.
            # Ejemplos:
            # - Linux/macOS: export CORS_ALLOWED_ORIGINS="https://tudominio.com"
            # - Windows PS:  $env:CORS_ALLOWED_ORIGINS="https://tudominio.com"
            # - Docker Compose: CORS_ALLOWED_ORIGINS=http://localhost:4200
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/usuario,/usuario/**

        - id: movie-service
          uri: lb://MOVIE-SERVICE
          predicates:
            - Path=/peliculas,/peliculas/**

        - id: genres-to-movie
          uri: lb://MOVIE-SERVICE
          predicates:
            - Path=/generos,/generos/**

        - id: directors-to-movie
          uri: lb://MOVIE-SERVICE
          predicates:
            - Path=/directores,/directores/**

        - id: movie-service-tmdb
          uri: lb://MOVIE-SERVICE
          predicates:
            - Path=/tmdb,/tmdb/**
          filters:
            - AddRequestHeader=X-Internal-Token, ${INTERNAL_API_KEY:dev-internal-key}

        - id: review-service
          uri: lb://REVIEW-SERVICE
          predicates:
            - Path=/reviews,/reviews/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:gateway-service}
    prefer-ip-address: false

# Circuit breaker para llamadas desde el gateway a movie-service (películas/directores/géneros)
resilience4j:
  circuitbreaker:
    instances:
      peliculas:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
