server:
  port: ${SERVER_PORT:9090}

spring:
  application:
    name: gateway-service3
  # Evita 403: desactiva seguridad reactiva si viene por dependencia transitiva
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOrigins: "http://localhost:4200"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/usuario/**

        - id: movie-service
          uri: lb://MOVIE-SERVICE
          predicates:
            - Path=/peliculas/**

        - id: genres-to-movie
          uri: lb://MOVIE-SERVICE
          predicates:
            - Path=/generos/**

        - id: directors-to-movie
          uri: lb://MOVIE-SERVICE
          predicates:
            - Path=/directores/**

        - id: movie-service-tmdb
          uri: lb://MOVIE-SERVICE
          predicates:
            - Path=/tmdb/**
          filters:
            - AddRequestHeader=X-Internal-Token, ${INTERNAL_API_KEY:dev-internal-key}

        - id: review-service
          uri: lb://REVIEW-SERVICE
          predicates:
            - Path=/reviews/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:gateway-service}
    prefer-ip-address: false

# Circuit breaker para llamadas desde el gateway a movie-service (películas/directores/géneros)
resilience4j:
  circuitbreaker:
    instances:
      peliculas:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
