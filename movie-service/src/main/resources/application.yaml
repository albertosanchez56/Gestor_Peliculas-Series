# Fallback local: arranque sin Config Server o si no devuelve esta propiedad
spring:
  application:
    name: movie-service

eureka:
  client:
    service-url:
      # En Docker: EUREKA_URL=http://eureka-service:8761/eureka
      # En local: usa el fallback a localhost
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:${spring.application.name}}
    prefer-ip-address: false

internal:
  api-key: ${INTERNAL_API_KEY:dev-internal-key}

# Circuit breaker para llamadas a la API de TMDB
resilience4j:
  circuitbreaker:
    instances:
      tmdb:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 15s
        failureRateThreshold: 50
