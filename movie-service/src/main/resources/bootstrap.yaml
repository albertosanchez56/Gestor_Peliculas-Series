server:
  port: 0

spring:
  application:
    name: movie-service
  cloud:
    config:
      enabled: true
      uri: http://localhost:8081

  datasource:
    url: jdbc:mysql://localhost:3306/pruebagestorpeliculas
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings

tmdb:
  api-key: ${TMDB_API_KEY:}
  base-url: https://api.themoviedb.org/3
  images-base: https://image.tmdb.org/t/p
  poster-size: /w500
  backdrop-size: /w780
  profile-size: /w300
  profileSize: /w185
  language: es-ES
  cert-country: ES
  # Si tu clave es de tipo "Bearer ..." deja esto en true
  use-bearer-auth: ${TMDB_USE_BEARER_AUTH:false}

