server:
  port: 0

spring:
  application:
    name: user-service
  cloud:
    config:
      enabled: true
      uri: http://localhost:8081

  datasource:
    url: jdbc:mysql://localhost:3306/pruebagestorusuarios
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${SHOW_SQL:false}

security:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-min-32-chars}
    expiration-minutes: ${JWT_EXP_MINUTES:120}

